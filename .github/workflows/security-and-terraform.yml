# Security & Terraform CI
#
# Jobs:
#   1. terraform-checks - terraform fmt + validate
#   2. ash              - AWS Automated Security Helper (aggregate scan)
#   3. checkov          - direct Checkov scan, SARIF to GitHub Code Scanning

name: security-and-terraform

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Minimum workflow-level permissions. Writes are scoped per job.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Terraform fmt + validate
  terraform-checks:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.12.2

      - name: terraform fmt (recursive, check only)
        run: terraform fmt -recursive -check -diff
        working-directory: terraform

      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false
        working-directory: terraform

      - name: terraform validate
        run: terraform validate -no-color
        working-directory: terraform

  # 2. AWS Automated Security Helper (ASH) scan
  ash:
    name: AWS Automated Security Helper
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run ASH (Docker)
        run: |
          set -euxo pipefail
          mkdir -p ash_output
          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            -v "${{ github.workspace }}/ash_output:/out" \
            public.ecr.aws/aws-solutions/automated-security-helper:latest \
            --source-dir /src \
            --output-dir /out \
            --no-color || true

      - name: Upload ASH report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ash-report
          path: ash_output/
          if-no-files-found: ignore
          retention-days: 30

      - name: Summarize ASH findings
        if: always()
        run: |
          echo "## ASH scan summary" >> "$GITHUB_STEP_SUMMARY"
          if [ -f ash_output/aggregated_results.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -n 60 ash_output/aggregated_results.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No aggregated_results.txt produced - check the ash-report artifact." >> "$GITHUB_STEP_SUMMARY"
          fi

  # 3. Checkov (SARIF -> GitHub Code Scanning)
  checkov:
    name: Checkov (Terraform)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # required by github/codeql-action/upload-sarif
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: true
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Upload raw Checkov report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checkov-report
          path: checkov-results.sarif
          if-no-files-found: ignore
          retention-days: 30
